<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bot Focus</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f0f1a;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #e0e0e0;
    }

    /* ── Layout ───────────────────────────────────────── */
    .focus-layout {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Top bar ──────────────────────────────────────── */
    .focus-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 12px;
      background: #161625;
      border-bottom: 1px solid #2a2a40;
      flex-shrink: 0;
      min-height: 38px;
    }

    .focus-bar__label {
      font-size: 15px;
      font-weight: 600;
      color: #00e5ff;
      white-space: nowrap;
    }

    .focus-bar__dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #555;
    }
    .focus-bar__dot--idle     { background: #888; }
    .focus-bar__dot--running  { background: #4caf50; }
    .focus-bar__dot--paused   { background: #ff9800; }
    .focus-bar__dot--done     { background: #2196f3; }
    .focus-bar__dot--dropped  { background: #4da8ff; }
    .focus-bar__dot--error    { background: #f44336; }
    .focus-bar__dot--stale    { background: #ff9800; }

    .focus-bar__status {
      font-size: 12px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .focus-bar__state {
      font-size: 12px;
      color: #888;
      margin-left: auto;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    .focus-bar__btn {
      background: #1e1e36;
      border: 1px solid #3a3a5a;
      color: #bbb;
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
    }
    .focus-bar__btn:hover { background: #2a2a48; color: #fff; }
    .focus-bar__btn:disabled { opacity: 0.4; cursor: default; }
    .focus-bar__btn--active { background: #00427a; border-color: #00e5ff; color: #00e5ff; }

    /* ── Main area: screenshot + optional log panel ──── */
    .focus-main {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    .focus-screenshot-pane {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      position: relative;
    }

    #screenshot {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }

    #placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: 16px;
    }

    .focus-done-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(15, 15, 26, 0.45);
      pointer-events: none;
      z-index: 2;
    }

    .focus-done-badge {
      background: rgba(33, 150, 243, 0.85);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      padding: 8px 20px;
      border-radius: 8px;
      letter-spacing: 0.03em;
    }

    /* ── Log panel (collapsible) ─────────────────────── */
    .focus-logs {
      width: 0;
      overflow: hidden;
      background: #12121f;
      border-left: 1px solid #2a2a40;
      display: flex;
      flex-direction: column;
      transition: width 0.2s ease;
      flex-shrink: 0;
    }
    .focus-logs--open {
      width: 340px;
    }

    .focus-logs__header {
      display: flex;
      align-items: center;
      padding: 6px 10px;
      border-bottom: 1px solid #2a2a40;
      gap: 6px;
      flex-shrink: 0;
    }

    .focus-logs__title {
      font-size: 13px;
      font-weight: 600;
      color: #ccc;
    }

    .focus-logs__count {
      font-size: 11px;
      color: #666;
      margin-left: auto;
    }

    .focus-logs__body {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
      font-size: 12px;
      font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    }

    .focus-logs__body::-webkit-scrollbar { width: 6px; }
    .focus-logs__body::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    .focus-logs__empty {
      padding: 20px;
      text-align: center;
      color: #555;
      font-style: italic;
    }

    /* ── Individual log entry ────────────────────────── */
    .focus-log {
      padding: 2px 10px;
      line-height: 1.5;
      border-bottom: 1px solid #1a1a2e;
    }

    .focus-log__time {
      color: #555;
      font-size: 11px;
      margin-right: 6px;
    }

    .focus-log__msg { color: #ccc; }

    .focus-log--info  .focus-log__msg { color: #b0bec5; }
    .focus-log--warn  .focus-log__msg { color: #ffc107; }
    .focus-log--error .focus-log__msg { color: #ef5350; }
    .focus-log--state .focus-log__msg { color: #00e5ff; font-weight: 500; }

    .focus-log--error { background: rgba(244, 67, 54, 0.08); }

  </style>
</head>
<body>
  <div class="focus-layout">
    <!-- Top bar: identity + controls -->
    <div class="focus-bar">
      <span class="focus-bar__dot" id="status-dot"></span>
      <span class="focus-bar__label" id="bot-label">Bot #?</span>
      <span class="focus-bar__status" id="bot-status">idle</span>
      <span class="focus-bar__state" id="bot-state"></span>
      <button class="focus-bar__btn" id="btn-pause">⏸ Pause</button>
      <button class="focus-bar__btn" id="btn-resume" disabled>▶ Resume</button>
      <button class="focus-bar__btn" id="btn-logs">📋 Logs</button>
    </div>

    <!-- Main area: screenshot + log panel -->
    <div class="focus-main">
      <div class="focus-screenshot-pane">
        <img id="screenshot" style="display:none;" alt="Bot focus view" />
        <div id="placeholder">Waiting for screenshot…</div>
      </div>

      <div class="focus-logs" id="log-panel">
        <div class="focus-logs__header">
          <span class="focus-logs__title">Decision Log</span>
          <span class="focus-logs__count" id="log-count">0 entries</span>
        </div>
        <div class="focus-logs__body" id="log-body">
          <div class="focus-logs__empty">No log entries yet.</div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const img = document.getElementById('screenshot');
    const placeholder = document.getElementById('placeholder');
    const botLabel = document.getElementById('bot-label');
    const botStatusEl = document.getElementById('bot-status');
    const botStateEl = document.getElementById('bot-state');
    const statusDot = document.getElementById('status-dot');
    const btnPause = document.getElementById('btn-pause');
    const btnResume = document.getElementById('btn-resume');
    const btnLogs = document.getElementById('btn-logs');
    const logPanel = document.getElementById('log-panel');
    const logBody = document.getElementById('log-body');
    const logCount = document.getElementById('log-count');
    let botId = null;
    let logEntryCount = 0;
    let logsOpen = false;
    let lastFrameUrl = null;

    const api = window.focusApi;

    function fmtTime(ts) {
      const d = new Date(ts);
      const hh = String(d.getHours()).padStart(2, '0');
      const mm = String(d.getMinutes()).padStart(2, '0');
      const ss = String(d.getSeconds()).padStart(2, '0');
      const ms = String(d.getMilliseconds()).padStart(3, '0');
      return hh + ':' + mm + ':' + ss + '.' + ms;
    }

    function escapeHtml(text) {
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
      return text.replace(/[&<>"']/g, c => map[c] || c);
    }

    function appendLogEntry(entry) {
      // Remove empty placeholder
      const empty = logBody.querySelector('.focus-logs__empty');
      if (empty) empty.remove();

      const el = document.createElement('div');
      el.className = 'focus-log focus-log--' + entry.level;
      el.innerHTML =
        '<span class="focus-log__time">' + fmtTime(entry.timestamp) + '</span>' +
        '<span class="focus-log__msg">' + escapeHtml(entry.message) + '</span>';
      logBody.appendChild(el);

      logEntryCount++;
      logCount.textContent = logEntryCount + (logEntryCount === 1 ? ' entry' : ' entries');

      // Auto-scroll to bottom
      logBody.scrollTop = logBody.scrollHeight;
    }

    function setStatus(status) {
      botStatusEl.textContent = status;
      statusDot.className = 'focus-bar__dot focus-bar__dot--' + status;

      const isRunning = status === 'running';
      const isPaused = status === 'paused';
      const isDone = status === 'done' || status === 'error' || status === 'dropped';
      btnPause.disabled = !isRunning;
      btnResume.disabled = !isPaused;

      if (isDone) {
        // Show last frame if available, or a "no frames" message
        if (lastFrameUrl) {
          img.src = lastFrameUrl;
          img.style.display = 'block';
          placeholder.style.display = 'none';
        } else {
          placeholder.textContent = 'No frames received.';
          placeholder.style.display = 'flex';
        }

        // Add "Session Complete" overlay badge
        const pane = document.querySelector('.focus-screenshot-pane');
        if (pane && !pane.querySelector('.focus-done-overlay')) {
          const overlay = document.createElement('div');
          overlay.className = 'focus-done-overlay';
          overlay.innerHTML = '<div class="focus-done-badge">Session Complete</div>';
          pane.appendChild(overlay);
        }
      }
    }

    function setState(state) {
      botStateEl.textContent = state;
    }

    // ── Toggle logs panel ──────────────────────────────
    btnLogs.addEventListener('click', () => {
      logsOpen = !logsOpen;
      logPanel.classList.toggle('focus-logs--open', logsOpen);
      btnLogs.classList.toggle('focus-bar__btn--active', logsOpen);
    });

    // ── Pause / Resume ─────────────────────────────────
    btnPause.addEventListener('click', () => {
      if (botId && api) api.sendCommand('cmd:pause-bot', { id: botId });
    });

    btnResume.addEventListener('click', () => {
      if (botId && api) api.sendCommand('cmd:resume-bot', { id: botId });
    });

    if (api) {
      // Live screenshot stream
      api.onScreenshot((dataUrl) => {
        lastFrameUrl = dataUrl;
        img.src = dataUrl;
        img.style.display = 'block';
        placeholder.style.display = 'none';
      });

      // Initial bot info + backfilled logs
      api.onBotInfo((info) => {
        botId = info.id;
        botLabel.textContent = 'Bot #' + info.index;
        setStatus(info.status);
        setState(info.currentState);
        document.title = 'Focus — Bot #' + info.index;

        // Backfill existing log entries
        if (info.logs && info.logs.length > 0) {
          for (const entry of info.logs) {
            appendLogEntry(entry);
          }
        }
      });

      // Incremental log entries
      api.onBotLog((entry) => {
        appendLogEntry(entry);
      });

      // Status changes
      api.onBotStatus((status) => {
        setStatus(status);
      });

      // FSM state changes
      api.onBotState((state) => {
        setState(state);
        appendLogEntry({ timestamp: Date.now(), level: 'state', message: 'State → ' + state });
      });
    }
  </script>
</body>
</html>
