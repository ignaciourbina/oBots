<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d2ff"/>
      <stop offset="100%" stop-color="#3a7bd5"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#56ab2f"/>
      <stop offset="100%" stop-color="#a8e063"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="none" stroke="#00d2ff" stroke-width="4" opacity="0.3"/>

  <!-- Grid: 2x2 bot tiles -->
  <!-- Top-left tile -->
  <rect x="72" y="80" width="170" height="150" rx="16" fill="#0f3460" stroke="#00d2ff" stroke-width="3" opacity="0.9"/>
  <!-- Top-right tile -->
  <rect x="270" y="80" width="170" height="150" rx="16" fill="#0f3460" stroke="#00d2ff" stroke-width="3" opacity="0.9"/>
  <!-- Bottom-left tile -->
  <rect x="72" y="258" width="170" height="150" rx="16" fill="#0f3460" stroke="#00d2ff" stroke-width="3" opacity="0.9"/>
  <!-- Bottom-right tile -->
  <rect x="270" y="258" width="170" height="150" rx="16" fill="#0f3460" stroke="#00d2ff" stroke-width="3" opacity="0.9"/>

  <!-- Bot face: top-left — happy -->
  <circle cx="132" cy="145" r="10" fill="#00d2ff"/>
  <circle cx="182" cy="145" r="10" fill="#00d2ff"/>
  <path d="M125 170 Q157 195 189 170" stroke="#00d2ff" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Bot face: top-right — neutral -->
  <circle cx="330" cy="145" r="10" fill="#a8e063"/>
  <circle cx="380" cy="145" r="10" fill="#a8e063"/>
  <line x1="325" y1="175" x2="385" y2="175" stroke="#a8e063" stroke-width="4" stroke-linecap="round"/>

  <!-- Bot face: bottom-left — thinking -->
  <circle cx="132" cy="323" r="10" fill="#f6c90e"/>
  <circle cx="182" cy="323" r="10" fill="#f6c90e"/>
  <path d="M125 350 Q145 340 165 350 Q175 355 189 348" stroke="#f6c90e" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Bot face: bottom-right — winking -->
  <circle cx="330" cy="323" r="10" fill="#e94560"/>
  <line x1="370" y1="318" x2="390" y2="328" stroke="#e94560" stroke-width="4" stroke-linecap="round"/>
  <path d="M325 350 Q355 375 385 350" stroke="#e94560" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- "oTree" text at bottom -->
  <text x="256" y="455" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="42" fill="#ffffff" letter-spacing="2">
    oTree Bots
  </text>

  <!-- Small antenna/signal on top -->
  <circle cx="256" cy="52" r="6" fill="#00d2ff"/>
  <line x1="256" y1="58" x2="256" y2="80" stroke="#00d2ff" stroke-width="3"/>
  <path d="M236 42 Q256 22 276 42" stroke="#00d2ff" stroke-width="2.5" fill="none" opacity="0.6"/>
  <path d="M224 34 Q256 8 288 34" stroke="#00d2ff" stroke-width="2" fill="none" opacity="0.35"/>
</svg>
