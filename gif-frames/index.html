<!DOCTYPE html>
<html>
<head>
<title>GIF Frame Viewer</title>
<style>
  body { background: #1e1e1e; color: #eee; font-family: monospace; margin: 20px; }
  .controls { position: sticky; top: 0; background: #1e1e1e; padding: 10px 0; z-index: 10; display: flex; gap: 12px; align-items: center; }
  .controls input[type=range] { flex: 1; }
  .controls button { padding: 6px 14px; cursor: pointer; }
  img { max-width: 100%; border: 1px solid #444; }
  .frame-label { font-size: 18px; margin: 8px 0; }
  .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(600px, 1fr)); gap: 8px; }
  .gallery img { width: 100%; }
  .gallery .item { position: relative; }
  .gallery .item span { position: absolute; top: 4px; left: 4px; background: rgba(0,0,0,.7); padding: 2px 6px; font-size: 12px; }
  .mode-toggle { margin-bottom: 10px; }
</style>
</head>
<body>
<h2>GIF Frames: Peek 2026-02-19 21-44.gif (227 frames, ~10fps)</h2>
<div class="mode-toggle">
  <button onclick="setMode('single')">Single Frame</button>
  <button onclick="setMode('gallery')">Gallery (all)</button>
  <button onclick="setMode('gallery10')">Every 10th</button>
</div>
<div id="single-view">
  <div class="controls">
    <button onclick="prev()">◀ Prev</button>
    <input type="range" id="slider" min="1" max="227" value="1" oninput="go(this.value)">
    <button onclick="next()">Next ▶</button>
    <span id="label">Frame 1 / 227</span>
    <button id="playBtn" onclick="togglePlay()">▶ Play</button>
  </div>
  <img id="frame" src="frame_0001.png">
</div>
<div id="gallery-view" style="display:none" class="gallery"></div>
<script>
  let cur = 1, playing = false, timer = null;
  const img = document.getElementById('frame');
  const slider = document.getElementById('slider');
  const label = document.getElementById('label');
  function pad(n) { return String(n).padStart(4, '0'); }
  function go(n) { cur = +n; img.src = `frame_${pad(cur)}.png`; slider.value = cur; label.textContent = `Frame ${cur} / 227`; }
  function prev() { if (cur > 1) go(cur - 1); }
  function next() { if (cur < 227) go(cur + 1); else { playing = false; clearInterval(timer); document.getElementById('playBtn').textContent = '▶ Play'; } }
  function togglePlay() {
    playing = !playing;
    document.getElementById('playBtn').textContent = playing ? '⏸ Pause' : '▶ Play';
    if (playing) timer = setInterval(() => next(), 100);
    else clearInterval(timer);
  }
  function setMode(m) {
    document.getElementById('single-view').style.display = m === 'single' ? '' : 'none';
    const gv = document.getElementById('gallery-view');
    gv.style.display = m !== 'single' ? '' : 'none';
    gv.innerHTML = '';
    const step = m === 'gallery10' ? 10 : 1;
    for (let i = 1; i <= 227; i += step) {
      const div = document.createElement('div'); div.className = 'item';
      const sp = document.createElement('span'); sp.textContent = `#${i}`;
      const im = document.createElement('img'); im.src = `frame_${pad(i)}.png`; im.loading = 'lazy';
      div.appendChild(sp); div.appendChild(im); gv.appendChild(div);
    }
  }
  document.addEventListener('keydown', e => { if (e.key === 'ArrowLeft') prev(); if (e.key === 'ArrowRight') next(); if (e.key === ' ') { e.preventDefault(); togglePlay(); } });
</script>
</body>
</html>
